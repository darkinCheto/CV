<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargar - CV Diana Jiménez</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body class="cover-letter-page">
    <main class="container">
        <article class="mx-auto" style="max-width:900px;">
            <div class="card shadow-sm border-0 rounded-3 overflow-hidden">
                <div class="card-body p-4 bg-white rounded-3">
                    

                    <div class="mb-3" style="height:600px;">
                        <!-- Intentamos incrustar el PDF; si el navegador no lo soporta, el enlace de descarga seguirá disponible -->
                        <iframe src="Document/Curriculum_Vitae_Diana_Jiménez.pdf" title="CV Diana Jiménez" class="w-100 h-100" style="border:0;"></iframe>
                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <a class="btn btn-primary" href="Document/Curriculum_Vitae_Diana_Jiménez.pdf" target="_blank">Abrir en nueva pestaña</a>
                    </div>
                </div>
            </div>
        </article>
    </main>

    <script>
        // Notificar altura al padre
        function sendHeight() {
            try {
                var body = document.body, html = document.documentElement;
                var height = Math.max(body.scrollHeight, body.offsetHeight, html.clientHeight, html.scrollHeight, html.offsetHeight);
                parent.postMessage({ type: 'contentHeight', height: height }, '*');
            } catch (e) {}
        }
        window.addEventListener('load', sendHeight);
        window.addEventListener('resize', sendHeight);
        setTimeout(sendHeight, 300);
    </script>
</body>
</html>
